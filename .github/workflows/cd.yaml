name: Continous Delivery Pipeline

on:
  release:
    types: [published]

jobs:
  publish-image:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: ghcr.io/ranjitar_rannaghor/admin-and-billing
            dockerfile: ./business-apps/admin-and-billing/Dockerfile
            context: ./business-apps/admin-and-billing
            cache-id: admin-billing
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{matrix.image}}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Build and Push Worker
        uses: docker/build-push-action@v6
        with:
          context: ${{matrix.context}}
          file: ${{matrix.dockerfile}}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache-id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-id }}
