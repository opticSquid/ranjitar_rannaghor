services:
  database:
    image: postgres:18
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: 0.1
          memory: 100M
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgresVolume:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    image: ghcr.io/opticsquid/ranjitar_rannaghor/admin-and-billing:1.7.2
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: 0.3
          memory: 200M
    restart: unless-stopped
    ports:
      - 8080:8080
    depends_on:
      database:
        condition: service_healthy
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=postgres
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - POSTGRES_DB=postgres
      - POSTGRES_SSLMODE=disable
volumes:
  postgresVolume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./db_storage
